<!DOCTYPE html>
<html lang="en">
<head>
    <i class="fa-solid fa-eraser"></i>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
    <title>Etch a Sketch</title>
</head>
<body>
    <h1 class="title">Etch a Sketch</h1>
    <div class="sketchBody">
        <div class="container"></div>
        <div class="buttons">
            <div class="colorBox">
                <input type="color" class="colorPicker">
            </div>
            <div class="slideContainer">
                <p class="slideText"></p>
                <input type="range" min="1" max="64" class="slide">
            </div>
           <div class="eraserContainer"><button class="button" id="erase">Erase</button></div>
            <div class="resetContainer"><button class="button" id="reset">Clear</button></div>
        </div>
    </div>
</body>
</html>
